if (!firebase.apps.length) firebase.initializeApp(_fbConfig);
const _db = firebase.firestore();
const _DOC = _db.collection('soogeum').doc('2026');

window.saveToCloud = async function(d) {
  try {
    await _DOC.set({
      misugeum: JSON.stringify(d.misugeum),
      jigeum: JSON.stringify(d.jigeum),
      updatedAt: new Date().toISOString()
    });
    console.log('☁️ 저장완료');
  } catch(e) { console.error('저장실패:', e); }
};

window.loadFromCloud = async function() {
  try {
    const snap = await _DOC.get();
    if (snap.exists) {
      const d = snap.data();
      return {
        misugeum: JSON.parse(d.misugeum || '[]'),
        jigeum: JSON.parse(d.jigeum || '[]')
      };
    }
  } catch(e) { console.error('로드실패:', e); }
  return null;
};

window.startSync = function(cb) {
  _DOC.onSnapshot((snap) => {
    if (snap.exists) {
      const d = snap.data();
      cb({
        misugeum: JSON.parse(d.misugeum || '[]'),
        jigeum: JSON.parse(d.jigeum || '[]')
      });
    }
  });
};
</script>

let data = { misugeum: [], jigeum: [] };

function today() {
  const d = new Date();
  return d.getFullYear() + '년 ' + (d.getMonth()+1) + '월 ' + d.getDate() + '일';
}
document.getElementById('todayDate').textContent = today();

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed.misugeum && parsed.misugeum.length > 0) data.misugeum = parsed.misugeum;
      else data.misugeum = PRESET_MIS.map((it,i) => ({...it, id: i+1}));
      if (parsed.jigeum && parsed.jigeum.length > 0) data.jigeum = parsed.jigeum;
      else data.jigeum = PRESET.map((it,i) => ({...it, id: i+1}));
    } else {
      data.misugeum = PRESET_MIS.map((it,i) => ({...it, id: i+1}));
      data.misugeum = PRESET_MIS.map((it,i) => ({...it, id: i+1}));
    data.jigeum = PRESET.map((it,i) => ({...it, id: i+1}));
    }
  } catch(e) {
    data.misugeum = PRESET_MIS.map((it,i) => ({...it, id: i+1}));
    data.jigeum = PRESET.map((it,i) => ({...it, id: i+1}));
  }
  render();
  setTodayDate();
  checkYearRollover();

  // 클라우드에서 최신 데이터 로드
  setTimeout(async () => {
    try {
      const cloudData = await window.loadFromCloud();
      if (cloudData && (cloudData.misugeum.length > 0 || cloudData.jigeum.length > 0)) {
        data = cloudData;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        render();
        toast('☁️ 동기화 완료!');
      }
    } catch(e) { console.error('동기화 실패:', e); }
    // 5초마다 변경사항 체크
    window.startSync((cloudData) => {
      data = cloudData;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      render();
      toast('☁️ 업데이트됨!');
    });
  }, 1000);
}

function exportBackup() {
  const ARCHIVE_KEY = 'soogeum_archive';
  let archive = [];
  try { archive = JSON.parse(localStorage.getItem(ARCHIVE_KEY)||'[]'); } catch(e) {}

  const backup = {
    version: 1,
    exportedAt: new Date().toISOString(),
    current: data,
    archive: archive
  };

  const json = JSON.stringify(backup, null, 2);
  const encrypted = CryptoJS.AES.encrypt(json, '5143').toString();
  const encWrapper = JSON.stringify({encrypted: true, data: encrypted});
  const blob = new Blob([encWrapper], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const d = new Date();
  const fileName = '수금대장_백업_' + d.getFullYear() + ('0'+(d.getMonth()+1)).slice(-2) + ('0'+d.getDate()).slice(-2) + '.json';

  // 파일 다운로드
  const a = document.createElement('a');
  a.href = url;
  a.download = fileName;
  a.click();
  URL.revokeObjectURL(url);

  // 이메일로 전송 (mailto)
  const dateStr = d.getFullYear() + '년 ' + (d.getMonth()+1) + '월 ' + d.getDate() + '일';
  const subject = encodeURIComponent('수금대장 백업 ' + dateStr);
  const body = encodeURIComponent(
    '수금대장 백업 파일입니다. (' + dateStr + ')\n\n' +
    '미수금 항목: ' + (data.misugeum ? data.misugeum.length : 0) + '개\n' +

function importBackup(event) {
  const file = event.target.files[0];
  if (!file) return;
  if (!confirm('현재 데이터를 백업 파일로 덮어씁니다. 계속할까요?')) {
    event.target.value = '';
    return;
  }
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      let parsed = JSON.parse(e.target.result);
      if (parsed.encrypted) {
        const pw = prompt('백업 파일 비밀번호를 입력하세요:');
        if (!pw) return;
        try {
          const bytes = CryptoJS.AES.decrypt(parsed.data, pw);
          const decrypted = bytes.toString(CryptoJS.enc.Utf8);
          if (!decrypted) { toast('비밀번호가 틀렸어요'); return; }
          parsed = JSON.parse(decrypted);
        } catch(err) {
          toast('비밀번호가 틀렸어요');
          return;
        }
      }
      const backup = parsed;
      if (!backup.current) { toast('올바른 백업 파일이 아니에요'); return; }
      data = backup.current;
      if (backup.archive) {
        localStorage.setItem('soogeum_archive', JSON.stringify(backup.archive));
      }
      save();
      render();
      toast('복원 완료!');
    } catch(err) {
      toast('파일을 읽을 수 없어요');
    }
    event.target.value = '';
  };
  reader.readAsText(file);
}

function checkYearRollover() {
  const ARCHIVE_KEY = 'soogeum_archive';
  const appYear = 2026;
  const curYear = new Date().getFullYear();
  if (curYear <= appYear) return;

  // 이미 아카이브 됐는지 확인
  let archive = [];
  try { archive = JSON.parse(localStorage.getItem(ARCHIVE_KEY)||'[]'); } catch(e) {}
  const alreadyDone = archive.find(a => a.year === appYear);
  if (alreadyDone) return;

  // 자동 백업 후 새 장부 시작
  const totalIncome = data.misugeum.filter(it=>it.done).reduce((s,it)=>s+Number(it.amt),0);
  const totalExpense = data.jigeum.filter(it=>it.done).reduce((s,it)=>s+Number(it.amt),0);
  archive.push({
    year: appYear,
    totalIncome,
    totalExpense,
    misugeum: [...data.misugeum],
    jigeum: [...data.jigeum],
    archivedAt: new Date().toISOString()
  });
  localStorage.setItem(ARCHIVE_KEY, JSON.stringify(archive));

  // 새 장부로 초기화
  data = { misugeum: [], jigeum: [] };
  save();
  document.querySelector('.app-title').textContent = '수금대장 ' + curYear;
  toast(appYear + '년 자동 백업 완료! ' + curYear + '년 장부 시작');
}

function fmt(n) { return Number(n).toLocaleString('ko-KR') + '원'; }

function setFilter(f) {

    el.classList.toggle('active', ['all','pending','done','taxpending'][i] === f);
  });

function render() {
  const items = [...data[tab]].sort((a,b) => {
    const toNum = d => { const [m,day] = (d||'0/0').split('/'); return parseInt(m)*100+parseInt(day); };
    const dateDiff = toNum(b.date) - toNum(a.date);
    if (dateDiff !== 0) return dateDiff;
    return (b.id || 0) - (a.id || 0);
  });
  // 월별 필터 버튼 생성 - M/D 형식 지원
  const getMonth = (date) => {
    if (!date) return null;
    if (date.includes('-')) return date.slice(0,7); // YYYY-MM
    const parts = date.split('/');
    if (parts.length >= 1) return parts[0].padStart(2,'0') + '월'; // M -> MM월
    return null;
  };
  const monthKeys = [...new Set(items.map(it => getMonth(it.date)).filter(Boolean))].sort((a,b) => {
    const na = parseInt(a); const nb = parseInt(b); return na - nb;
  });
  const mfRow = document.getElementById('monthFilterRow');
  if (mfRow) {
    const allBtn = '<button class="month-btn'+(monthSel==='all'?' active':'')+'" onclick="setMonthSel(\'all\')">전체</button>';
    const monthBtns = monthKeys.map(m => {
      const active = monthSel===m?' active':'';
      return '<button class="month-btn'+active+'" onclick="setMonthSel(\''+m+'\')">'+m+'</button>';
    }).join('');
    mfRow.innerHTML = allBtn + monthBtns;
  }

  const searchQ = (document.getElementById('searchBox')?.value || '').toLowerCase();

  const filtered = items.filter(it => {
    if (filter === 'done' && !it.done) return false;
    if (filter === 'pending' && it.done) return false;
    if (filter === 'taxpending' && it.tax !== 'pending') return false;
    if (monthSel !== 'all') {
      const itMonth = getMonth(it.date);
      if (itMonth !== monthSel) return false;
    }
    if (searchQ && !(it.desc||'').toLowerCase().includes(searchQ)) return false;
    return true;
  });
  const total = items.reduce((s, it) => s + Number(it.amt), 0);
  const pending = items.filter(it => !it.done).reduce((s, it) => s + Number(it.amt), 0);
  const cl = tab === 'misugeum' ? 'red' : 'green';
  document.getElementById('totalAmt').textContent = fmt(total);
  document.getElementById('pendingAmt').className = 'stat-val ' + cl;
  document.getElementById('pendingAmt').textContent = fmt(pending);
  const el = document.getElementById('listEl');
  if (!filtered.length) { el.innerHTML = '<div class="empty">항목이 없습니다</div>'; return; }
  const ck = tab === 'misugeum' ? 'mis' : 'ji';
  const taxMap = {issued:{cls:'issued',lbl:'계산서발행'}, pending:{cls:'pending',lbl:'계산서미발행'}, none:{cls:'none',lbl:'계산서없음'}};
  el.innerHTML = filtered.map(it => {
    const ri = data[tab].findIndex(x => x.id === it.id);
    const taxInfo = taxMap[it.tax] || taxMap['pending'];
    return `<div class="item${it.done?' done':''}">
      <div class="check${it.done?' checked '+ck:''}" onclick="toggle(${ri})"></div>
      <div class="item-body">
        <div class="item-desc">${it.desc}</div>
        <div class="item-meta">
          ${it.date?`<span class="item-date">${it.date}</span>`:''}
          <span class="item-amt ${cl}">${fmt(it.amt)}</span>
          <button class="tax-badge ${taxInfo.cls}" onclick="toggleTax(${ri})">${taxInfo.lbl}</button>
        </div>
      </div>
      <button class="item-del" onclick="del(${ri})">×</button>
    </div>`;
  }).join('');
}

function addItem() {

  document.getElementById('inpDesc').value = '';
  document.getElementById('inpAmt').value = '';
  document.getElementById('inpAmt').dataset.raw = '';
  setTodayDate();
  toast('추가됐어요!');
}

function renderSuyik() {
  const ARCHIVE_KEY = 'soogeum_archive';
  const curYear = new Date().getFullYear();
  const appYear = 2026;

  // 월별 계산 (완료된 항목만)
  const months = {};
  for (let m = 1; m <= 12; m++) months[m] = {income: 0, expense: 0};

  data.misugeum.filter(it => it.done).forEach(it => {
    const m = parseInt((it.date||'').split('/')[0]);
    if (m >= 1 && m <= 12) months[m].income += Number(it.amt);
  });
  data.jigeum.filter(it => it.done).forEach(it => {
    const m = parseInt((it.date||'').split('/')[0]);
    if (m >= 1 && m <= 12) months[m].expense += Number(it.amt);
  });

  const totalIncome = Object.values(months).reduce((s,v) => s+v.income, 0);
  const totalExpense = Object.values(months).reduce((s,v) => s+v.expense, 0);
  const totalProfit = totalIncome - totalExpense;

  // 아카이브 데이터
  let archive = [];
  try { archive = JSON.parse(localStorage.getItem(ARCHIVE_KEY)||'[]'); } catch(e) {}

  const fmt2 = n => {
    const abs = Math.abs(n);
    return (n < 0 ? '-' : '') + abs.toLocaleString('ko-KR') + '원';
  };
  const cls = n => n >= 0 ? 'pos' : 'neg';

  const monthNames = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const activeMonths = Object.entries(months).filter(([m,v]) => v.income > 0 || v.expense > 0);

  let html = `
    <div class="year-card">
      <div class="year-title">${appYear}년 연간 순수익</div>
      <div class="year-big ${cls(totalProfit)}">${fmt2(totalProfit)}</div>
      <div style="margin-top:10px;display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div><div style="font-size:11px;color:var(--text2)">총 미수금</div><div style="font-size:14px;font-weight:700;color:#4caf85">${totalIncome.toLocaleString('ko-KR')}원</div></div>
        <div><div style="font-size:11px;color:var(--text2)">총 지급금</div><div style="font-size:14px;font-weight:700;color:#e05a4e">${totalExpense.toLocaleString('ko-KR')}원</div></div>
      </div>
    </div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:8px">월별 내역 (완료 기준)</div>
  `;

  activeMonths.forEach(([m, v]) => {
    const profit = v.income - v.expense;
    html += `
      <div class="month-card">
        <div class="month-label">${monthNames[m-1]}</div>
        <div class="month-row"><span class="label">미수금</span><span class="val pos">+${v.income.toLocaleString('ko-KR')}원</span></div>
        <div class="month-row"><span class="label">지급금</span><span class="val neg">-${v.expense.toLocaleString('ko-KR')}원</span></div>
        <div class="month-row" style="border-top:1px solid var(--border);padding-top:6px;margin-top:4px">
          <span class="label" style="font-weight:500;color:var(--text)">순수익</span>
          <span class="val ${cls(profit)}" style="font-size:14px">${fmt2(profit)}</span>
        </div>
      </div>
    `;
  });

  // 연도 전환 안내
  if (curYear > appYear) {
    const alreadyArchived = archive.find(a => a.year === appYear);
    if (!alreadyArchived) {
      html += `
        <button class="archive-btn" onclick="archiveYear(${appYear})">
          📦 ${appYear}년 데이터 보관하고 ${curYear}년으로 전환
        </button>
      `;
    }
  }

  // 보관된 연도 목록
  if (archive.length > 0) {
    html += `<div class="archive-section"><div class="archive-title">보관된 연도</div>`;
    archive.forEach(a => {
      const p = a.totalIncome - a.totalExpense;
      html += `
        <div class="archive-item" onclick="showArchive(${a.year})">
          <div class="archive-item-label">${a.year}년</div>
          <div class="archive-item-val ${cls(p)}">${fmt2(p)}</div>
        </div>
      `;
    });
    html += `</div>`;
  }

  document.getElementById('suyikContent').innerHTML = html;
}

function archiveYear(year) {
  if (!confirm(year + '년 데이터를 보관하고 새 장부를 시작할까요?')) return;
  const ARCHIVE_KEY = 'soogeum_archive';

  const totalIncome = data.misugeum.filter(it=>it.done).reduce((s,it)=>s+Number(it.amt),0);
  const totalExpense = data.jigeum.filter(it=>it.done).reduce((s,it)=>s+Number(it.amt),0);

  archive.push({
    year,
    totalIncome,
    totalExpense,
    misugeum: data.misugeum,
    jigeum: data.jigeum,
    archivedAt: new Date().toISOString()
  });

  localStorage.setItem(ARCHIVE_KEY, JSON.stringify(archive));

      <div class="month-row"><span class="label">지급금</span><span class="val neg">-${v.expense.toLocaleString('ko-KR')}원</span></div>
      <div class="month-row" style="border-top:1px solid var(--border);padding-top:6px;margin-top:4px">
